<!DOCTYPE html>
<!--
  TRAININGSPLAN-DASHBOARD (Liquid-Glass, mobile-first)
  ====================================================
  AKTUALISIEREN: Nur den Datenblock `const PLAN` unten im <script> anpassen
  (Tage/Termine), dann committen + pushen. CSS/JS muss nicht angefasst werden.
  Details siehe CLAUDE.md im selben Ordner.
-->
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trainingsplan">
<title>Trainingsplan</title>
<style>
  :root {
    --accent: #0a84ff;
    --accent-2: #5e5ce6;
    --grad: linear-gradient(135deg, #0a84ff, #5e5ce6);
    --bg-0: #0a0e17;
    --bg-1: #0f1626;
    --text: #e6edf3;
    --muted: #9aa4b2;
    --glass: rgba(255,255,255,0.07);
    --glass-strong: rgba(255,255,255,0.10);
    --glass-border: rgba(255,255,255,0.12);
    --glass-edge: rgba(255,255,255,0.28);
    --panel: rgba(18,24,38,0.72);
    --card: rgba(16,22,36,0.66);
    --shadow: 0 8px 32px rgba(0,0,0,0.45);
    --radius: 18px;
    --ok: #3fb950;
    --warn: #d29922;
    --meal: #e9a23b;
    /* Bereichsfarben der Trakte (aus dem Lageplan) — themenunabhängig */
    --a: #f2cf3e; --b: #ef8b3f; --c: #e0533f;
    --d: #5b8fd4; --e: #2fb8a6; --f: #d65f96; --k: #b06fd0;
  }
  [data-theme="light"] {
    --accent: #007aff;
    --bg-0: #e9eef6;
    --bg-1: #ffffff;
    --text: #1f2328;
    --muted: #5b6675;
    --glass: rgba(255,255,255,0.60);
    --glass-strong: rgba(255,255,255,0.72);
    --glass-border: rgba(255,255,255,0.7);
    --glass-edge: rgba(255,255,255,0.9);
    --panel: rgba(255,255,255,0.82);
    --card: rgba(255,255,255,0.78);
    --shadow: 0 8px 30px rgba(40,60,100,0.16);
    --ok: #1a7f37;
    --warn: #9a6700;
    --meal: #c77f17;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    * { transition: none !important; animation: none !important; }
  }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text); background: var(--bg-1); line-height: 1.55;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(60vw 60vw at 12% 8%, rgba(10,132,255,0.32), transparent 60%),
      radial-gradient(50vw 50vw at 88% 22%, rgba(94,92,230,0.26), transparent 60%),
      radial-gradient(55vw 55vw at 70% 90%, rgba(64,156,255,0.18), transparent 60%),
      linear-gradient(160deg, var(--bg-0), var(--bg-1));
  }
  [data-theme="light"] body::before {
    background:
      radial-gradient(60vw 60vw at 12% 8%, rgba(0,122,255,0.14), transparent 60%),
      radial-gradient(50vw 50vw at 88% 22%, rgba(94,92,230,0.12), transparent 60%),
      radial-gradient(55vw 55vw at 70% 90%, rgba(64,156,255,0.10), transparent 60%),
      linear-gradient(160deg, var(--bg-0), var(--bg-1));
  }

  .wrap { max-width: 560px; margin: 0 auto; padding: 0 14px 60px; }

  /* ---- Header ---- */
  .header {
    position: sticky; top: 0; z-index: 20;
    margin: 0 -14px 12px; padding: calc(env(safe-area-inset-top) + 12px) 16px 12px;
    display: flex; align-items: center; gap: 12px;
    background: var(--panel);
    backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--glass-border);
  }
  .header .logo { width: 38px; height: 38px; flex: 0 0 38px; display: grid; place-items: center; background: var(--grad); border-radius: 11px; color: #fff; box-shadow: 0 4px 14px rgba(10,132,255,0.4); }
  .header .logo svg { width: 22px; height: 22px; }
  .header .titles { flex: 1 1 auto; min-width: 0; }
  .header .titles .t { font-weight: 700; font-size: 17px; line-height: 1.2; }
  .header .titles .s { color: var(--muted); font-size: 12.5px; }
  .theme-btn { flex: 0 0 auto; display: grid; place-items: center; width: 40px; height: 40px; cursor: pointer; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text); transition: background .2s; }
  .theme-btn:active { background: var(--glass-strong); }
  .theme-btn svg { width: 19px; height: 19px; }
  .theme-btn .sun { display: none; }
  [data-theme="light"] .theme-btn .moon { display: none; }
  [data-theme="light"] .theme-btn .sun { display: block; }

  /* ---- Tag-Umschalter ---- */
  .days {
    display: flex; gap: 6px; padding: 5px; margin: 0 0 14px;
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 14px; box-shadow: inset 0 1px 0 var(--glass-edge);
    overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .days::-webkit-scrollbar { display: none; }
  .day-tab {
    flex: 1 1 0; min-width: 64px; border: none; cursor: pointer;
    padding: 8px 6px; border-radius: 10px; background: transparent; color: var(--text);
    font-family: inherit; text-align: center; transition: background .2s, color .2s;
  }
  .day-tab .dow { font-size: 12px; color: var(--muted); font-weight: 600; }
  .day-tab .dnum { font-size: 18px; font-weight: 700; line-height: 1.15; }
  .day-tab.active { background: var(--grad); color: #fff; box-shadow: 0 4px 14px rgba(10,132,255,0.35); }
  .day-tab.active .dow { color: rgba(255,255,255,0.85); }
  .day-tab.alldone .dnum::after { content: " ✓"; color: var(--ok); font-size: 13px; }
  .day-tab.active.alldone .dnum::after { color: #fff; }

  /* ---- Tageskopf + Fortschritt ---- */
  .dayhead { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin: 2px 2px 12px; }
  .dayhead h1 { font-size: 21px; margin: 0; letter-spacing: -0.01em; }
  .dayhead .prog { font-size: 13px; color: var(--muted); white-space: nowrap; }

  /* ---- Heute-Karte (Uhr/Jetzt + Zeitband) ---- */
  .today { background: linear-gradient(135deg, rgba(10,132,255,.16), rgba(94,92,230,.13));
    border: 1px solid var(--glass-border); border-radius: var(--radius);
    box-shadow: var(--shadow), inset 0 1px 0 var(--glass-edge); padding: 14px 15px 12px; margin: 0 0 14px; }
  .today:empty { display: none; }
  .today .thead { display: flex; align-items: flex-start; gap: 13px; }
  .today .clock { font-size: 27px; font-weight: 800; letter-spacing: -.02em; line-height: 1; white-space: nowrap; }
  .today .clock small { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-top: 3px; }
  .today .lines { flex: 1; min-width: 0; font-size: 13.5px; display: flex; flex-direction: column; gap: 4px; }
  .today .lines .nx { color: var(--muted); font-size: 12.5px; }
  .today .pill { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 7px; vertical-align: middle; }
  .today .pill.live { background: var(--ok); color: #04210d; }
  .today .pill.meal { background: var(--meal); color: #241402; }
  .today .pill.due { background: var(--warn); color: #241402; }
  [data-theme="light"] .today .pill.live { color: #fff; }
  [data-theme="light"] .today .pill.meal { color: #fff; }
  [data-theme="light"] .today .pill.due { color: #fff; }
  .today .rcap { font-size: 13px; font-weight: 700; margin: 0 0 2px; }
  .today .ribbon { position: relative; height: 26px; border-radius: 8px; background: var(--glass);
    border: 1px solid var(--glass-border); margin: 13px 0 0; }
  .today .ribbon .mseg { position: absolute; top: 0; bottom: 0; background: rgba(233,162,59,.30);
    border-left: 1px solid rgba(233,162,59,.55); border-right: 1px solid rgba(233,162,59,.55); }
  .today .ribbon .rdot { position: absolute; top: 50%; width: 10px; height: 10px; border-radius: 50%;
    transform: translate(-50%,-50%); border: 2px solid var(--bg-1); }
  .today .ribbon .rdot.done { background: transparent; opacity: 0.4; }
  .today .ribbon .rdot.overdue { background: transparent; border-color: var(--warn); box-shadow: 0 0 0 1px var(--warn), 0 0 7px rgba(210,153,34,.7); }
  .today .ribbon .rnow { position: absolute; top: -4px; bottom: -4px; width: 2px; background: var(--text); }
  .today .rticks { position: relative; height: 13px; margin-top: 3px; color: var(--muted); font-size: 10px; }
  .today .rticks span { position: absolute; transform: translateX(-50%); }
  .today .rlegend { display: flex; gap: 14px; margin-top: 9px; font-size: 11px; color: var(--muted); }
  .today .rlegend i { font-style: normal; }
  .today .rlegend .sw { display: inline-block; width: 10px; height: 10px; border-radius: 3px; vertical-align: -1px; margin-right: 4px; }

  /* ---- Termin-Karten ---- */
  .list { display: flex; flex-direction: column; gap: 10px; }
  .appt {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 14px 16px; background: var(--card);
    border: 1px solid var(--glass-border); border-radius: 16px;
    box-shadow: var(--shadow), inset 0 1px 0 var(--glass-edge);
    cursor: pointer; overflow: hidden; max-height: 320px;
    transition: max-height .28s ease, padding .28s ease, opacity .2s, transform .08s;
  }
  .appt:active { transform: scale(0.992); }
  .appt .check {
    flex: 0 0 26px; width: 26px; height: 26px; margin-top: 2px;
    border: 2px solid var(--glass-border); border-radius: 9px;
    display: grid; place-items: center; transition: background .2s, border-color .2s;
  }
  .appt .check svg { width: 15px; height: 15px; color: #fff; opacity: 0; transition: opacity .15s; }
  .appt .body { flex: 1 1 auto; min-width: 0; }
  .appt .time { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; }
  .appt .name { font-size: 15px; margin-top: 1px; }
  .appt .note { font-size: 13px; color: var(--muted); margin-top: 5px; }
  .room {
    display: inline-flex; align-items: flex-start; gap: 6px; margin-top: 9px;
    padding: 6px 11px; border-radius: 10px; cursor: pointer;
    background: var(--glass); border: 1px solid var(--glass-border);
    color: var(--accent); font-size: 13px; font-weight: 600; font-family: inherit;
    max-width: 100%; text-align: left;
  }
  .room svg { width: 14px; height: 14px; flex: 0 0 14px; margin-top: 2px; }
  .room .rt { min-width: 0; white-space: normal; overflow-wrap: anywhere; line-height: 1.35; }
  .room.nomap { color: var(--muted); }
  .appt:active .room { background: var(--glass); }

  /* Zusammengezogen: Zeit + Name in einer Zeile; Notiz/Raum werden vom max-height
     weggeschnitten → ergibt den Harmonika-Slide beim Ab-/Aufhaken. */
  .appt.done { opacity: 0.55; max-height: 48px; padding-top: 9px; padding-bottom: 9px; }
  .appt.done .check { background: var(--grad); border-color: transparent; margin-top: 0; }
  .appt.done .check svg { opacity: 1; }
  .appt.done .time, .appt.done .name { display: inline; text-decoration: line-through; }
  .appt.done .time { font-size: 15px; margin-right: 7px; }
  .appt.done .name { font-size: 14px; }

  /* „als Nächstes dran" — der nächste offene Termin am heutigen Tag */
  .appt.next { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 8px 24px rgba(0,0,0,.18), inset 0 1px 0 var(--glass-edge); }
  .appt.next .time { color: var(--accent); }
  .appt.next .name::after { content: "als Nächstes"; display: inline-block; margin-left: 8px;
    font-size: 11px; font-weight: 700; color: var(--accent); border: 1px solid var(--accent);
    border-radius: 999px; padding: 1px 7px; vertical-align: middle; }

  /* läuft gerade (offener Termin im aktuellen Zeitfenster) */
  .appt.now { border-color: var(--ok); box-shadow: 0 0 0 1px var(--ok), 0 8px 24px rgba(0,0,0,.18), inset 0 1px 0 var(--glass-edge); }
  .appt.now .time { color: var(--ok); }
  .appt.now .name::after { content: "jetzt"; display: inline-block; margin-left: 8px; font-size: 11px; font-weight: 700;
    color: #04210d; background: var(--ok); border-radius: 999px; padding: 1px 8px; vertical-align: middle; }
  [data-theme="light"] .appt.now .name::after { color: #fff; }

  /* überfällig (offener Termin, Zeit vorbei und nicht mehr laufend) */
  .appt.overdue { border-color: var(--warn); box-shadow: 0 0 0 1px var(--warn), 0 8px 24px rgba(0,0,0,.18), inset 0 1px 0 var(--glass-edge); }
  .appt.overdue .check { border-color: var(--warn); }
  .appt.overdue .time { color: var(--warn); }
  .appt.overdue .name::after { content: "überfällig"; display: inline-block; margin-left: 8px; font-size: 11px; font-weight: 700;
    color: #241402; background: var(--warn); border-radius: 999px; padding: 1px 8px; vertical-align: middle; }
  [data-theme="light"] .appt.overdue .name::after { color: #fff; }

  .empty { text-align: center; color: var(--muted); padding: 48px 16px; font-style: italic; }

  footer { margin-top: 26px; padding: 14px 4px; color: var(--muted); font-size: 12px; text-align: center; }
  footer a { color: var(--accent); }

  /* ---- Grundriss-Overlay ---- */
  .overlay {
    position: fixed; inset: 0; z-index: 60; display: none;
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    flex-direction: column;
    padding: calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 12px);
  }
  .overlay.open { display: flex; }
  .overlay-bar { display: flex; align-items: center; gap: 12px; color: #fff; margin-bottom: 10px; }
  .overlay-bar .ot { flex: 1 1 auto; font-weight: 600; font-size: 15px; }
  .overlay-close { flex: 0 0 auto; display: grid; place-items: center; width: 40px; height: 40px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.12); color: #fff; cursor: pointer; }
  .overlay-close svg { width: 20px; height: 20px; }
  .overlay-scroll { flex: 1 1 auto; overflow: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; gap: 16px; }
  .overlay-scroll .map { margin: 0; display: flex; flex-direction: column; gap: 6px; }
  .overlay-scroll .map-cap { color: #d8dee9; font-size: 13px; font-weight: 600; padding: 0 2px; }
  .overlay-scroll img { width: 100%; height: auto; border-radius: 10px; background: #fff; }
  .overlay-msg { color: #d8dee9; text-align: center; padding: 40px 20px; line-height: 1.6; }

  /* ---- Dynamische Orientierungskarte (SVG) ---- */
  .mapcard { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14);
    border-radius: 18px; padding: 8px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.18); }
  .mapcard svg { width: 100%; height: auto; display: block; background: transparent; border-radius: 0; }
  .map-chips { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin: 14px 2px 0; }
  .map-chips .chip { display: inline-flex; align-items: center; gap: 7px; padding: 7px 12px;
    border-radius: 11px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16);
    color: #e8edf5; font-size: 13px; font-weight: 600; }
  .map-chips .chip .dot { width: 11px; height: 11px; border-radius: 50%; flex: 0 0 11px; }
  .map-chips .lvlpill { color: #fff; background: var(--grad); border-color: transparent; }
  .map-legend { margin: 14px 2px 2px; color: #c2cad6; font-size: 12.5px; line-height: 1.5; }
  @keyframes tp-pulse { 0%{ r:13; opacity:.55 } 70%{ r:30; opacity:0 } 100%{ opacity:0 } }
  .mapcard .pulse { animation: tp-pulse 2.4s ease-out infinite; transform-origin: center; }
  @media (prefers-reduced-motion: reduce){ .mapcard .pulse{ animation: none; opacity: 0 } }
  #fx { position: fixed; inset: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 90; }
  .toast { position: fixed; left: 50%; top: 16%; transform: translateX(-50%) translateY(-12px);
    background: rgba(20,28,52,.92); border: 1px solid var(--stroke, rgba(255,255,255,.12));
    color: #fff; padding: 11px 18px; border-radius: 999px; font-weight: 600; font-size: 15px;
    z-index: 95; opacity: 0; transition: .3s; backdrop-filter: blur(10px);
    box-shadow: 0 8px 30px rgba(0,0,0,.4); pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body data-page="trainingsplan">
  <canvas id="fx"></canvas>
  <div class="toast" id="celebrate">🎉 Tag geschafft!</div>
  <div class="wrap">
    <div class="header">
      <span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2.5"/><path d="M3 9h18M8 2v4M16 2v4M8.5 14l2 2 4-4"/></svg></span>
      <div class="titles">
        <div class="t">Trainingsplan</div>
        <div class="s" id="weeklabel"></div>
      </div>
      <button class="theme-btn" id="themeBtn" aria-label="Hell/Dunkel umschalten">
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>
      </button>
    </div>

    <div class="days" id="days" role="tablist"></div>

    <div class="dayhead">
      <h1 id="dayTitle"></h1>
      <span class="prog" id="dayProg"></span>
    </div>

    <div class="today" id="todayCard"></div>

    <div class="list" id="list"></div>

    <footer id="footer"></footer>
  </div>

  <!-- Grundriss-Overlay -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true">
    <div class="overlay-bar">
      <span class="ot" id="overlayTitle">Grundriss</span>
      <button class="overlay-close" id="overlayClose" aria-label="Schließen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>
    <div class="overlay-scroll" id="overlayBody"></div>
  </div>

<script>
/* =====================================================================
   DATENBLOCK (Offline-Fallback).
   ---------------------------------------------------------------------
   Die LIVE-Termine stehen in `plan.json` (wird beim Start frisch geladen,
   Cache-sicher). Dieser eingebettete `PLAN_DEFAULT` ist nur der Fallback,
   wenn `plan.json` (noch) nicht geladen werden kann — z. B. offline oder beim
   lokalen Öffnen per file://. BEIM UPDATE beide synchron halten:
   `plan.json` UND diesen Block auf denselben Stand bringen.
   ---------------------------------------------------------------------
   meta.woche  : Anzeigetext im Header.
   tage[]      : ein Eintrag pro Tag.
     datum     : ISO "YYYY-MM-DD" (stabil — wird als Schlüssel für Häkchen genutzt).
     dow       : Kürzel im Tag-Umschalter (Mo/Di/Mi/Do/Fr).
     termine[] : zeit "HH:MM", name, raum, optional note.
   raum        : Trakt + Ebene + Bereich. Die Orientierungskarte wird daraus
                 AUTOMATISCH gezeichnet — Format beibehalten:
                 "Trakt <A–F>/E<n> · <Bereich> …"  z. B. "Trakt E/E0 · Sporthalle"
                 oder "Kesselhaus · EG <Bereich>" (EG = Ebene 1).
                 Trakt-Buchstabe steuert, welcher Bereich auf der Karte leuchtet;
                 die Ebene wird aus "/E<n>" bzw. "EG" gelesen. Kein Bild nötig.
   Privatsphäre: KEINE Namen/Diagnosen/Zimmer/Pat.-Nr. — nur Zeit/Leistung/Raum.
   ===================================================================== */
var PLAN_DEFAULT = {
  meta: {
    woche: "22.–27. Juni 2026", stand: "2026-06-22", quelle: "Ausdruck 22.06.2026",
    essenszeiten: {
      werktag:    [ {name:"Frühstück",von:"07:15",bis:"09:00"}, {name:"Mittag",von:"11:30",bis:"12:45"}, {name:"Abendessen",von:"17:00",bis:"18:30"} ],
      wochenende: [ {name:"Frühstück",von:"07:30",bis:"09:00"}, {name:"Mittag",von:"11:30",bis:"12:30"}, {name:"Abendessen",von:"17:00",bis:"18:15"} ]
    }
  },
  tage: [
    { datum: "2026-06-22", dow: "Mo", termine: [
      { zeit: "08:55", name: "Übungsgruppe", raum: "Trakt E/E0 · Therapiebereich 3 · Sporthalle" },
      { zeit: "10:40", name: "Hydrojetmassage", raum: "Trakt C/E0 · Therapiebereich 1" },
      { zeit: "11:30", name: "Gymnastik HWS/LWS", raum: "Trakt D/E0 · Therapiebereich 2 · Gymn.halle", note: "Handtuch und Trainingsjacke mitbringen." },
      { zeit: "14:15", name: "Einführung Atem- + Muskelentspannung", raum: "Kesselhaus · EG Vortragssaal" }

    });
    // Baustelle (oberer Teil von C, bis Oberkante B/F)
    s += '<rect x="156" y="150" width="48" height="42" rx="5" fill="url(#tpBau)" opacity=".6"/>'
       + '<g transform="translate(180 144)">'
       + '<path d="M0 -12 L13 11 L-13 11 Z" fill="#f2b21a" stroke="#1a1a1a" stroke-width="2.2" stroke-linejoin="round"/>'
       + '<rect x="-1.6" y="-5" width="3.2" height="9" rx="1.4" fill="#1a1a1a"/><circle cx="0" cy="7" r="1.8" fill="#1a1a1a"/></g>';
    // Haupteingang (Basis von C)
    s += '<g transform="translate(180 254)"><path d="M0 8 L-6 -3 L6 -3 Z" fill="var(--accent)"/>'
       + '<text x="0" y="22" text-anchor="middle" style="font:700 8.5px -apple-system,sans-serif" fill="var(--accent)">Haupteingang</text></g>';
    s += pins + '</svg>';
    return s;
  }

  function openGrundriss(t){
    var target = parseTrakt(t.raum);
    var eb = parseEbene(t.raum);
    var bereich = bereichOf(t.raum);
    overlayTitle.textContent = t.raum;
    var html = '<div class="mapcard">' + mapSVG(target) + '</div>';
    html += '<div class="map-chips">';
    html += '<span class="chip lvlpill">Ebene ' + ebeneText(eb) + '</span>';
    if (target) html += '<span class="chip"><span class="dot" style="background:' + (TCOLOR[target] || 'var(--accent)') + '"></span>Ziel: Trakt ' + target + '</span>';
    html += '</div>';
    var detour = (target === 'D' || target === 'E')
      ? ' <b>Achtung Baustelle – nicht begehbar:</b> Zu Trakt D/E auf Ebene 0 Richtung F'
        + ' (Speisesaal), dann durch den kleinen Gang neben F (parallel zur Baustelle) '
        + (target === 'E' ? 'über D weiter nach E' : 'nach D') + '.'
      : ' Das Warndreieck markiert die aktuelle Baustelle (nicht begehbar).';
    html += '<div class="map-legend">Der Zielort ist hell hervorgehoben'
      + (bereich ? ' (' + bereich + ')' : '') + '. Eingang über Trakt C, dann Ebene '
      + ebeneText(eb) + '. Übrige Trakte nur zur Orientierung gedimmt.'
      + detour + '</div>';
    overlayBody.innerHTML = html;
    overlayBody.scrollTop = 0;
    overlay.classList.add('open');
  }
  function closeOverlay(){ overlay.classList.remove('open'); }

  // ---- Plan anwenden + frisch laden (Cache-sicher, Offline-Fallback) ----
  // Reihenfolge: sofort aus Cache/Default rendern, dann plan.json frisch holen
  // (Cache-Bust + no-store) und bei Änderung neu rendern. Häkchen liegen separat
  // im localStorage und bleiben dabei unangetastet.
  var PLAN_STORE_KEY = 'tp-' + PAGE + '-plandata';

  function planValid(p){ return p && p.tage && p.tage.length >= 0 && p.meta; }
  function planEqual(a, b){ try { return JSON.stringify(a) === JSON.stringify(b); } catch(e){ return false; } }

  function applyPlan(plan){
    if (!planValid(plan)) return;
    PLAN = plan;
    var _st = (PLAN.meta && PLAN.meta.stand) || '', _stTxt = '';
    if (/^\d{4}-\d{2}-\d{2}$/.test(_st)){ var _p = _st.split('-'); _stTxt = ' · Stand ' + _p[2] + '.' + _p[1] + '.'; }
    weeklabel.textContent = ((PLAN.meta && PLAN.meta.woche) || '') + _stTxt;
    footer.innerHTML = 'Stand ' + ((PLAN.meta && PLAN.meta.stand) || '')
      + (PLAN.meta && PLAN.meta.quelle ? ' · ' + PLAN.meta.quelle : '')
      + ' · Häkchen werden auf diesem Gerät gespeichert.';
    // Feste Wochenleiste Mo–Sa: Tage mit Terminen aus PLAN, leere Tage automatisch.
    var byDow = {}; PLAN.tage.forEach(function(t){ byDow[t.dow] = t; });
    var monday = null;
    for (var i = 0; i < PLAN.tage.length; i++){
      var off = WD.indexOf(PLAN.tage[i].dow);
      if (off >= 0){ monday = addDays(PLAN.tage[i].datum, -off); break; }
    }
    DAYS = WD.map(function(dow, idx){
      return byDow[dow] || { datum: monday ? addDays(monday, idx) : ('leer-' + dow), dow: dow, termine: [] };
    });
    if (firstApply){
      var today = todayISO(); active = 0;
      for (var j = 0; j < DAYS.length; j++){ if (DAYS[j].datum === today){ active = j; break; } }
      firstApply = false;
    } else if (active >= DAYS.length){ active = 0; }
    renderTabs();
    renderDay();
  }

  // 1) Sofort: zuletzt geladener Plan aus localStorage, sonst der eingebettete Default.
  var startPlan = PLAN_DEFAULT;
  try { var cached = store.get(PLAN_STORE_KEY); if (cached){ var cp = JSON.parse(cached); if (planValid(cp)) startPlan = cp; } } catch(e){}
  applyPlan(startPlan);

  // 2) Frisch: plan.json mit Cache-Bust + no-store. Klappt online (GitHub Pages);
  //    offline oder über file:// schlägt es still fehl, dann bleibt der Start-Plan.
  (function fetchFreshPlan(){
    if (typeof fetch !== 'function') return;
    try {
      fetch('plan.json?t=' + (new Date().getTime()), { cache: 'no-store' })
        .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
        .then(function(fresh){
          if (!planValid(fresh)) return;
          store.set(PLAN_STORE_KEY, JSON.stringify(fresh));
          if (!planEqual(fresh, PLAN)) applyPlan(fresh);
        })
        .catch(function(){ /* offline / file:// — Start-Plan bleibt */ });
    } catch(e){}
  })();

  // 3) Live-Uhr: solange der heutige Tag angezeigt wird, die Heute-Karte
  //    minütlich auffrischen (Uhr, „jetzt"-Linie, Jetzt/Nächstes).
  setInterval(function(){
    var tag = DAYS[active];
    if (tag && tag.datum === todayISO()){ renderTodayCard(); updateTodayStates(); }
  }, 30000);

  // ---- Belohnungs-Effekte: Canvas-Partikel-Engine ----
  var REDUCE = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var fxCv = document.getElementById('fx'), fxCtx = fxCv.getContext('2d');
  var FXDPR = Math.min(2, window.devicePixelRatio || 1);
  function fxSize(){ fxCv.width = innerWidth * FXDPR; fxCv.height = innerHeight * FXDPR; fxCtx.setTransform(FXDPR,0,0,FXDPR,0,0); }
  fxSize(); window.addEventListener('resize', fxSize);
  var parts = [], fxOn = false, MAX_PARTS = 400;
  var FXCOL = ['#6ea8fe','#a78bfa','#34d399','#fbbf24','#f472b6','#22d3ee'];
  function fxColor(){ return FXCOL[Math.floor(Math.random() * FXCOL.length)]; }
  function fxTick(){
    fxCtx.clearRect(0,0,innerWidth,innerHeight);
    for (var i = parts.length - 1; i >= 0; i--){
      var p = parts[i];
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.vx *= 0.99; p.life--; p.rot += p.vr;
      fxCtx.globalAlpha = Math.max(0, Math.min(1, p.life / p.fade));
      if (p.kind === 'spark'){ fxCtx.fillStyle = p.c; fxCtx.beginPath(); fxCtx.arc(p.x, p.y, p.r, 0, 7); fxCtx.fill(); }
      else { fxCtx.save(); fxCtx.translate(p.x, p.y); fxCtx.rotate(p.rot); fxCtx.fillStyle = p.c; fxCtx.fillRect(-p.r, -p.r*0.6, p.r*2, p.r*1.2); fxCtx.restore(); }
      if (p.life <= 0 || p.y > innerHeight + 40) parts.splice(i, 1);
    }
    fxCtx.globalAlpha = 1;
    if (parts.length){ requestAnimationFrame(fxTick); } else { fxOn = false; fxCtx.clearRect(0,0,innerWidth,innerHeight); }
  }
  function run(){ if (!fxOn){ fxOn = true; requestAnimationFrame(fxTick); } }
  function confettiRain(){
    if (REDUCE) return;
    var n = Math.min(140, MAX_PARTS - parts.length);
    for (var i = 0; i < n; i++){
      parts.push({ x: Math.random()*innerWidth, y: -20 - Math.random()*innerHeight*0.5,
        vx: (Math.random()-0.5)*1.5, vy: 2 + Math.random()*3, g: 0.05,
        r: 3 + Math.random()*4, c: fxColor(), life: 120, fade: 90,
        rot: Math.random()*7, vr: (Math.random()-0.5)*0.5, kind: 'conf' });
    }
    run();
  }
  function firework(x, y){
    if (REDUCE) return;
    var n = Math.min(70, MAX_PARTS - parts.length), base = fxColor();
    for (var i = 0; i < n; i++){
      var ang = (i / n) * Math.PI * 2, sp = 3.5 + Math.random()*2;
      parts.push({ x: x, y: y, vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp, g: 0.045,
        r: 2 + Math.random()*2, c: Math.random() < 0.7 ? base : fxColor(), life: 70, fade: 70,
        rot: 0, vr: 0, kind: 'spark' });
    }
    run();
  }
  function celebrateToast(){
    var t = document.getElementById('celebrate'); if (!t) return;
    t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); }, 2200);
  }
})();
</script>
