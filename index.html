<!DOCTYPE html>
<!--
  TRAININGSPLAN-DASHBOARD (Liquid-Glass, mobile-first)
  ====================================================
  AKTUALISIEREN: Nur den Datenblock `const PLAN` unten im <script> anpassen
  (Tage/Termine), dann committen + pushen. CSS/JS muss nicht angefasst werden.
  Details siehe CLAUDE.md im selben Ordner.
-->
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trainingsplan">
<title>Trainingsplan</title>
<style>
  :root {
    --accent: #0a84ff;
    --accent-2: #5e5ce6;
    --grad: linear-gradient(135deg, #0a84ff, #5e5ce6);
    --bg-0: #0a0e17;
    --bg-1: #0f1626;
    --text: #e6edf3;
    --muted: #9aa4b2;
    --glass: rgba(255,255,255,0.07);
    --glass-strong: rgba(255,255,255,0.10);
    --glass-border: rgba(255,255,255,0.12);
    --glass-edge: rgba(255,255,255,0.28);
    --panel: rgba(18,24,38,0.72);
    --card: rgba(16,22,36,0.66);
    --shadow: 0 8px 32px rgba(0,0,0,0.45);
    --radius: 18px;
    --ok: #3fb950;
    --warn: #d29922;
  }
  [data-theme="light"] {
    --accent: #007aff;
    --bg-0: #e9eef6;
    --bg-1: #ffffff;
    --text: #1f2328;
    --muted: #5b6675;
    --glass: rgba(255,255,255,0.60);
    --glass-strong: rgba(255,255,255,0.72);
    --glass-border: rgba(255,255,255,0.7);
    --glass-edge: rgba(255,255,255,0.9);
    --panel: rgba(255,255,255,0.82);
    --card: rgba(255,255,255,0.78);
    --shadow: 0 8px 30px rgba(40,60,100,0.16);
    --ok: #1a7f37;
    --warn: #9a6700;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    * { transition: none !important; animation: none !important; }
  }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text); background: var(--bg-1); line-height: 1.55;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(60vw 60vw at 12% 8%, rgba(10,132,255,0.32), transparent 60%),
      radial-gradient(50vw 50vw at 88% 22%, rgba(94,92,230,0.26), transparent 60%),
      radial-gradient(55vw 55vw at 70% 90%, rgba(64,156,255,0.18), transparent 60%),
      linear-gradient(160deg, var(--bg-0), var(--bg-1));
  }
  [data-theme="light"] body::before {
    background:
      radial-gradient(60vw 60vw at 12% 8%, rgba(0,122,255,0.14), transparent 60%),
      radial-gradient(50vw 50vw at 88% 22%, rgba(94,92,230,0.12), transparent 60%),
      radial-gradient(55vw 55vw at 70% 90%, rgba(64,156,255,0.10), transparent 60%),
      linear-gradient(160deg, var(--bg-0), var(--bg-1));
  }

  .wrap { max-width: 560px; margin: 0 auto; padding: 0 14px 60px; }

  /* ---- Header ---- */
  .header {
    position: sticky; top: 0; z-index: 20;
    margin: 0 -14px 12px; padding: calc(env(safe-area-inset-top) + 12px) 16px 12px;
    display: flex; align-items: center; gap: 12px;
    background: var(--panel);
    backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--glass-border);
  }
  .header .logo { width: 38px; height: 38px; flex: 0 0 38px; display: grid; place-items: center; background: var(--grad); border-radius: 11px; color: #fff; box-shadow: 0 4px 14px rgba(10,132,255,0.4); }
  .header .logo svg { width: 22px; height: 22px; }
  .header .titles { flex: 1 1 auto; min-width: 0; }
  .header .titles .t { font-weight: 700; font-size: 17px; line-height: 1.2; }
  .header .titles .s { color: var(--muted); font-size: 12.5px; }
  .theme-btn { flex: 0 0 auto; display: grid; place-items: center; width: 40px; height: 40px; cursor: pointer; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text); transition: background .2s; }
  .theme-btn:active { background: var(--glass-strong); }
  .theme-btn svg { width: 19px; height: 19px; }
  .theme-btn .sun { display: none; }
  [data-theme="light"] .theme-btn .moon { display: none; }
  [data-theme="light"] .theme-btn .sun { display: block; }

  /* ---- Tag-Umschalter ---- */
  .days {
    display: flex; gap: 6px; padding: 5px; margin: 0 0 14px;
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 14px; box-shadow: inset 0 1px 0 var(--glass-edge);
    overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .days::-webkit-scrollbar { display: none; }
  .day-tab {
    flex: 1 1 0; min-width: 64px; border: none; cursor: pointer;
    padding: 8px 6px; border-radius: 10px; background: transparent; color: var(--text);
    font-family: inherit; text-align: center; transition: background .2s, color .2s;
  }
  .day-tab .dow { font-size: 12px; color: var(--muted); font-weight: 600; }
  .day-tab .dnum { font-size: 18px; font-weight: 700; line-height: 1.15; }
  .day-tab.active { background: var(--grad); color: #fff; box-shadow: 0 4px 14px rgba(10,132,255,0.35); }
  .day-tab.active .dow { color: rgba(255,255,255,0.85); }
  .day-tab.alldone .dnum::after { content: " ✓"; color: var(--ok); font-size: 13px; }
  .day-tab.active.alldone .dnum::after { color: #fff; }

  /* ---- Tageskopf + Fortschritt ---- */
  .dayhead { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin: 2px 2px 12px; }
  .dayhead h1 { font-size: 21px; margin: 0; letter-spacing: -0.01em; }
  .dayhead .prog { font-size: 13px; color: var(--muted); white-space: nowrap; }

  /* ---- Termin-Karten ---- */
  .list { display: flex; flex-direction: column; gap: 10px; }
  .appt {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 14px 16px; background: var(--card);
    border: 1px solid var(--glass-border); border-radius: 16px;
    box-shadow: var(--shadow), inset 0 1px 0 var(--glass-edge);
    cursor: pointer; transition: opacity .2s, transform .08s;
  }
  .appt:active { transform: scale(0.992); }
  .appt .check {
    flex: 0 0 26px; width: 26px; height: 26px; margin-top: 2px;
    border: 2px solid var(--glass-border); border-radius: 9px;
    display: grid; place-items: center; transition: background .2s, border-color .2s;
  }
  .appt .check svg { width: 15px; height: 15px; color: #fff; opacity: 0; transition: opacity .15s; }
  .appt .body { flex: 1 1 auto; min-width: 0; }
  .appt .time { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; }
  .appt .name { font-size: 15px; margin-top: 1px; }
  .appt .note { font-size: 13px; color: var(--muted); margin-top: 5px; }
  .room {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 9px;
    padding: 6px 11px; border-radius: 10px; cursor: pointer;
    background: var(--glass); border: 1px solid var(--glass-border);
    color: var(--accent); font-size: 13px; font-weight: 600; font-family: inherit;
    max-width: 100%; text-align: left;
  }
  .room svg { width: 14px; height: 14px; flex: 0 0 14px; }
  .room .rt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .room.nomap { color: var(--muted); }
  .appt:active .room { background: var(--glass); }

  .appt.done { opacity: 0.6; }
  .appt.done .check { background: var(--grad); border-color: transparent; }
  .appt.done .check svg { opacity: 1; }
  .appt.done .time, .appt.done .name { text-decoration: line-through; }

  .empty { text-align: center; color: var(--muted); padding: 48px 16px; font-style: italic; }

  footer { margin-top: 26px; padding: 14px 4px; color: var(--muted); font-size: 12px; text-align: center; }
  footer a { color: var(--accent); }

  /* ---- Grundriss-Overlay ---- */
  .overlay {
    position: fixed; inset: 0; z-index: 60; display: none;
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    flex-direction: column;
    padding: calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 12px);
  }
  .overlay.open { display: flex; }
  .overlay-bar { display: flex; align-items: center; gap: 12px; color: #fff; margin-bottom: 10px; }
  .overlay-bar .ot { flex: 1 1 auto; font-weight: 600; font-size: 15px; }
  .overlay-close { flex: 0 0 auto; display: grid; place-items: center; width: 40px; height: 40px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.12); color: #fff; cursor: pointer; }
  .overlay-close svg { width: 20px; height: 20px; }
  .overlay-scroll { flex: 1 1 auto; overflow: auto; -webkit-overflow-scrolling: touch; display: grid; place-items: center; border-radius: 14px; }
  .overlay-scroll img { max-width: 100%; height: auto; border-radius: 10px; }
  .overlay-msg { color: #d8dee9; text-align: center; padding: 40px 20px; line-height: 1.6; }
</style>
</head>
<body data-page="trainingsplan">
  <div class="wrap">
    <div class="header">
      <span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2.5"/><path d="M3 9h18M8 2v4M16 2v4M8.5 14l2 2 4-4"/></svg></span>
      <div class="titles">
        <div class="t">Trainingsplan</div>
        <div class="s" id="weeklabel"></div>
      </div>
      <button class="theme-btn" id="themeBtn" aria-label="Hell/Dunkel umschalten">
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>
      </button>
    </div>

    <div class="days" id="days" role="tablist"></div>

    <div class="dayhead">
      <h1 id="dayTitle"></h1>
      <span class="prog" id="dayProg"></span>
    </div>

    <div class="list" id="list"></div>

    <footer id="footer"></footer>
  </div>

  <!-- Grundriss-Overlay -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true">
    <div class="overlay-bar">
      <span class="ot" id="overlayTitle">Grundriss</span>
      <button class="overlay-close" id="overlayClose" aria-label="Schließen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>
    <div class="overlay-scroll" id="overlayBody"></div>
  </div>

<script>
/* =====================================================================
   DATENBLOCK — beim neuen Ausdruck NUR diese Struktur anpassen.
   ---------------------------------------------------------------------
   meta.woche  : Anzeigetext im Header.
   tage[]      : ein Eintrag pro Tag.
     datum     : ISO "YYYY-MM-DD" (stabil — wird als Schlüssel für Häkchen genutzt).
     dow       : Kürzel im Tag-Umschalter (Mo/Di/Mi/Do/Fr).
     termine[] : zeit "HH:MM", name, raum, optional note, optional grundriss.
                 grundriss = Schlüssel aus GRUNDRISSE (null/weglassen = "folgt").
   GRUNDRISSE  : Raum-Plan-Register. Bild-Dateien liegen im selben Ordner.
   Privatsphäre: KEINE Namen/Diagnosen/Zimmer/Pat.-Nr. — nur Zeit/Leistung/Raum.
   ===================================================================== */
var GRUNDRISSE = {
  // "kesselhaus": { titel: "Kesselhaus / EG", bild: "grundriss-1.png" },
  // "trakt-e":    { titel: "Trakt E / E0",   bild: "grundriss-2.png" }
};

var PLAN = {
  meta: { woche: "22.–25. Juni 2026", stand: "2026-06-20", quelle: "Ausdruck 19.06.2026" },
  tage: [
    { datum: "2026-06-22", dow: "Mo", termine: [
      { zeit: "08:55", name: "Übungsgruppe", raum: "Trakt E/E0 · Therapiebereich 3 · Sporthalle" },
      { zeit: "10:40", name: "Hydrojetmassage", raum: "Trakt C/E0 · Therapiebereich 1" },
      { zeit: "11:30", name: "Gymnastik HWS/LWS", raum: "Trakt D/E0 · Therapiebereich 2 · Gymn.halle", note: "Handtuch und Trainingsjacke mitbringen." },
      { zeit: "14:15", name: "Einführung Atem- + Muskelentspannung", raum: "Kesselhaus · EG Vortragssaal" }
    ]},
    { datum: "2026-06-23", dow: "Di", termine: [
      { zeit: "08:55", name: "Übungsgruppe", raum: "Trakt E/E0 · Therapiebereich 3 · Sporthalle" },
      { zeit: "10:00", name: "Seminar für Herzpatienten", raum: "Trakt F/E1 · 5300 · Schulungsraum 6" },
      { zeit: "14:00", name: "Wärmepackung", raum: "Trakt C/E0 · Therapiebereich 1" },
      { zeit: "15:20", name: "Vortrag: Bewegung/Sport bei Herzkrankheit", raum: "Kesselhaus · EG Vortragssaal" }
    ]},
    { datum: "2026-06-24", dow: "Mi", termine: [
      { zeit: "08:55", name: "Übungsgruppe", raum: "Trakt E/E0 · Therapiebereich 3 · Sporthalle" },
      { zeit: "10:00", name: "Seminar für Herzpatienten", raum: "Trakt F/E1 · 5300 · Schulungsraum 6" },
      { zeit: "11:00", name: "Feedbackgespräch", raum: "Kesselhaus · EG Vortragssaal", note: "Mit den Patientenfürsprecherinnen der Klinik." },
      { zeit: "13:00", name: "Mittlere Wanderung (max. 60 Min.)", raum: "Trakt E/E0 · Therapiebereich 3", note: "Wetterfeste Kleidung mitbringen." },
      { zeit: "14:15", name: "Info: Rehabilitation und Sozialrecht", raum: "Kesselhaus · EG Vortragssaal" },
      { zeit: "15:30", name: "Vortrag: Herzinfarkt + Durchblutungsstörung", raum: "Kesselhaus · EG Vortragssaal" }
    ]},
    { datum: "2026-06-25", dow: "Do", termine: [
      { zeit: "07:40", name: "Wärmepackung", raum: "Trakt C/E0 · Therapiebereich 1" },
      { zeit: "08:55", name: "Übungsgruppe", raum: "Trakt E/E0 · Therapiebereich 3 · Sporthalle" },
      { zeit: "10:00", name: "Seminar für Herzpatienten (Teil 3)", raum: "Trakt F/E1 · 5300 · Schulungsraum 6" },
      { zeit: "11:40", name: "Visite", raum: "Trakt A/E · 2/200 · Station 2", note: "Therapieheft mitbringen." }
    ]}
  ]
};
/* ===================== ENDE DATENBLOCK ===================== */

(function(){
  "use strict";
  var PAGE = document.body.getAttribute('data-page') || 'page';
  var store = {
    get: function(k){ try { return localStorage.getItem(k); } catch(e){ return null; } },
    set: function(k,v){ try { localStorage.setItem(k,v); } catch(e){} }
  };

  // Theme
  var root = document.documentElement, themeBtn = document.getElementById('themeBtn');
  var savedTheme = store.get('ohd-theme');
  if (savedTheme === 'light' || savedTheme === 'dark') root.setAttribute('data-theme', savedTheme);
  var meta = document.querySelector('meta[name=theme-color]');
  function syncMeta(){ if (meta) meta.setAttribute('content', root.getAttribute('data-theme') === 'light' ? '#e9eef6' : '#0a0e17'); }
  syncMeta();
  themeBtn.addEventListener('click', function(){
    var next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    root.setAttribute('data-theme', next); store.set('ohd-theme', next); syncMeta();
  });

  // Helfer
  function el(tag, cls){ var e = document.createElement(tag); if (cls) e.className = cls; return e; }
  function svgIcon(paths){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' + paths + '</svg>'; }
  var PIN = '<circle cx="12" cy="10" r="3"/><path d="M12 21s7-6.3 7-11a7 7 0 10-14 0c0 4.7 7 11 7 11z"/>';
  var CHECK = svgIcon('<path d="M5 12l4 4L19 7"/>');
  function key(datum, zeit, name){ return 'tp-' + PAGE + '-' + datum + '|' + zeit + '|' + name; }
  function dayDone(tag){ return tag.termine.length > 0 && tag.termine.every(function(t){ return store.get(key(tag.datum, t.zeit, t.name)) === '1'; }); }

  var weeklabel = document.getElementById('weeklabel');
  var daysEl = document.getElementById('days');
  var dayTitle = document.getElementById('dayTitle');
  var dayProg = document.getElementById('dayProg');
  var listEl = document.getElementById('list');
  var footer = document.getElementById('footer');

  weeklabel.textContent = PLAN.meta.woche || '';

  var DOW_LANG = { Mo:'Montag', Di:'Dienstag', Mi:'Mittwoch', Do:'Donnerstag', Fr:'Freitag', Sa:'Samstag', So:'Sonntag' };
  function tagnum(datum){ var p = datum.split('-'); return p.length === 3 ? String(parseInt(p[2],10)) : datum; }

  // Aktiven Tag bestimmen: heute, sonst erster Tag
  function todayISO(){ try { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); } catch(e){ return null; } }
  var today = todayISO();
  var active = 0;
  for (var i = 0; i < PLAN.tage.length; i++){ if (PLAN.tage[i].datum === today){ active = i; break; } }

  function renderTabs(){
    daysEl.innerHTML = '';
    PLAN.tage.forEach(function(tag, idx){
      var b = el('button', 'day-tab' + (idx === active ? ' active' : '') + (dayDone(tag) ? ' alldone' : ''));
      b.setAttribute('role', 'tab');
      b.innerHTML = '<div class="dow">' + tag.dow + '</div><div class="dnum">' + tagnum(tag.datum) + '</div>';
      b.addEventListener('click', function(){ active = idx; renderTabs(); renderDay(); });
      daysEl.appendChild(b);
    });
  }

  function updateProgress(){
    var tag = PLAN.tage[active]; if (!tag) return;
    var total = tag.termine.length;
    var done = tag.termine.filter(function(t){ return store.get(key(tag.datum, t.zeit, t.name)) === '1'; }).length;
    dayProg.textContent = total ? (done + ' / ' + total + ' erledigt') : '';
    // Tab-Häkchen aktualisieren
    var tab = daysEl.children[active];
    if (tab) tab.classList.toggle('alldone', dayDone(tag));
  }

  function renderDay(){
    var tag = PLAN.tage[active];
    listEl.innerHTML = '';
    if (!tag){ return; }
    dayTitle.textContent = DOW_LANG[tag.dow] || tag.dow;
    if (!tag.termine.length){
      var em = el('div', 'empty'); em.textContent = 'Keine Termine an diesem Tag.'; listEl.appendChild(em);
      dayProg.textContent = ''; return;
    }
    tag.termine.forEach(function(t){
      var k = key(tag.datum, t.zeit, t.name);
      var done = store.get(k) === '1';
      var card = el('div', 'appt' + (done ? ' done' : ''));

      var check = el('div', 'check'); check.innerHTML = CHECK;
      var body = el('div', 'body');
      body.innerHTML = '<div class="time">' + t.zeit + '</div><div class="name"></div>';
      body.querySelector('.name').textContent = t.name;
      if (t.note){ var n = el('div', 'note'); n.textContent = t.note; body.appendChild(n); }

      // Raum-Button
      var g = t.grundriss && GRUNDRISSE[t.grundriss] ? GRUNDRISSE[t.grundriss] : null;
      var room = el('button', 'room' + (g ? '' : ' nomap'));
      room.innerHTML = svgIcon(PIN) + '<span class="rt"></span>';
      room.querySelector('.rt').textContent = t.raum + (g ? '' : ' · Grundriss folgt');
      room.addEventListener('click', function(e){ e.stopPropagation(); openGrundriss(t, g); });
      body.appendChild(room);

      card.appendChild(check); card.appendChild(body);
      card.addEventListener('click', function(){
        var now = store.get(k) !== '1';
        store.set(k, now ? '1' : '0');
        card.classList.toggle('done', now);
        updateProgress();
      });
      listEl.appendChild(card);
    });
    updateProgress();
  }

  // Grundriss-Overlay
  var overlay = document.getElementById('overlay');
  var overlayTitle = document.getElementById('overlayTitle');
  var overlayBody = document.getElementById('overlayBody');
  document.getElementById('overlayClose').addEventListener('click', closeOverlay);
  overlay.addEventListener('click', function(e){ if (e.target === overlay) closeOverlay(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeOverlay(); });

  function openGrundriss(t, g){
    overlayTitle.textContent = t.raum;
    if (g && g.bild){
      overlayBody.innerHTML = '<img alt="Grundriss ' + (g.titel || '') + '">';
      overlayBody.querySelector('img').src = g.bild;
    } else {
      overlayBody.innerHTML = '<div class="overlay-msg">Für diesen Raum ist noch kein Grundriss hinterlegt.<br>Die Scans werden ergänzt, sobald sie vorliegen.</div>';
    }
    overlay.classList.add('open');
  }
  function closeOverlay(){ overlay.classList.remove('open'); }

  footer.innerHTML = 'Stand ' + (PLAN.meta.stand || '') + (PLAN.meta.quelle ? ' · ' + PLAN.meta.quelle : '') + ' · Häkchen werden auf diesem Gerät gespeichert.';

  renderTabs();
  renderDay();
})();
</script>
</body>
</html>
